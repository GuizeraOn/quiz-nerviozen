    <style>
        :root {
            --bg: #FFFFFF;
            --text: #000000;
            --text-secondary: #4A4A4A;
            --alert-bg: #FFE5E5; /* Soft red alert */
            --alert-text: #D8000C;

        }

        * {

            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Top Warning Bar */
        .top-bar {
            background-color: var(--alert-bg);
            color: var(--alert-text);
            text-align: center;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #FFB2B2;
        }

        /* Container & Layout */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 16px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Headline */
        .headline {
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 24px;
        }
        
        @media (min-width: 768px) {
            .headline { font-size: 32px; }
        }

        .headline span {
            color: var(--alert-text);
        }

        /* Video Section */
        .video-container {
            width: 100%;
            max-width: 400px; /* Mobile focused max-width as requested by vturb snippet */
            position: relative;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background: #000;
            aspect-ratio: 3/4;
            overflow: hidden;
        }

        @media (max-width: 480px) {
            .video-container {
                max-width: 100%;
                border-radius: 8px;
            }
        }

        /* Delay Section */
        #delayed-offer-container {
            display: none; /* Hidden strictly by default */
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

    <!-- Scripts: UTM Preservation, Tracking & Delay -->
    <script>
        // 1. UTM and SCK Preservation
        function updateUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.toString()) return;

            const utms = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
            let sckParts = [];
            utms.forEach(param => {
                sckParts.push(urlParams.get(param) || '');
            });
            const sckStr = sckParts.some(p => p !== '') ? sckParts.join('|') : '';

            // Although the Hotmart widget usually grabs UTMs automatically, 
            // any direct 'a' tags can be mutated just in case
            document.querySelectorAll("a").forEach(function(link) {
                if(link.href.includes("hotmart.com")) {
                    const separator = link.href.includes("?") ? "&" : "?";
                    link.href += separator + urlParams.toString();
                    if(sckStr) {
                        link.href += "&sck=" + sckStr;
                    }
                }
            });
        }
        updateUrlParams();

        // 2. Logic Delay Timer
        // Set to 05:09:15 (309.15 seconds / 309150 milliseconds)
        const delayInMilliseconds = 309150; 
        
        setTimeout(function() {
            document.getElementById('delayed-offer-container').style.display = 'block';
        }, delayInMilliseconds);


        // 3. Meta Pixel Tracking for AddToCart (attached to widget interaction)
        const widgetContainer = document.getElementById('widget-tracker');
        widgetContainer.addEventListener('click', function(e) {
            // Check if what was clicked seems to be an accept button. 
            // Hotmart buttons often have 'button' tags or role='button'
            fbq('track', 'AddToCart', {
                items: [{
                    id: 'activador_10x',
                    quantity: 1,
                    price: 17.00
                }],
                currency: 'USD'
            });
        });
    </script>
